# OpenShift Route for external access to Grafana dashboard.
# Standalone kustomize deployments only (kubectl apply -k).
# Not used by install scripts — the Grafana Operator creates its own route.
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana-ingress
  namespace: maas-api
  labels:
    app: grafana
    component: observability
spec:
  to:
    kind: Service
    name: grafana-service
  port:
    targetPort: grafana
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect